name: pkgwhy package gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # advisory: always produce reports and do not fail the job.
  # strict: fail when precheck returns review/block/unavailable exit codes.
  # agent: same fail behavior as strict, plus an optional agent precheck target.
  PKGWHY_MODE: advisory
  PKGWHY_AGENT_PACKAGE: ""

jobs:
  pkgwhy:
    name: pkgwhy package review
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pkgwhy
        run: python -m pip install pkgwhy

      - name: Run pkgwhy package checks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p pkgwhy-reports

          precheck_status=0
          if [ -f requirements.txt ]; then
            set +e
            python -m pkgwhy precheck -r requirements.txt --json --enforce-exit-code > pkgwhy-reports/precheck.json
            precheck_status=$?
            set -e
          elif [ -f pyproject.toml ]; then
            set +e
            python -m pkgwhy precheck pyproject.toml --json --enforce-exit-code > pkgwhy-reports/precheck.json
            precheck_status=$?
            set -e
          else
            printf '{"schema_version":"pkgwhy.ci_note.v1","message":"requirements.txt or pyproject.toml not found"}\n' > pkgwhy-reports/precheck.json
          fi

          set +e
          python -m pkgwhy audit --limit 50 --json > pkgwhy-reports/audit.json
          audit_json_status=$?
          python -m pkgwhy audit --limit 50 --markdown > pkgwhy-reports/audit.md
          audit_markdown_status=$?
          set -e
          audit_status=0
          if [ "${audit_json_status}" -ne 0 ]; then
            audit_status="${audit_json_status}"
          elif [ "${audit_markdown_status}" -ne 0 ]; then
            audit_status="${audit_markdown_status}"
          fi

          agent_status=0
          if [ "${PKGWHY_MODE}" = "agent" ] && [ -n "${PKGWHY_AGENT_PACKAGE}" ]; then
            set +e
            python -m pkgwhy agent precheck "${PKGWHY_AGENT_PACKAGE}" --json > pkgwhy-reports/agent-precheck.json
            agent_status=$?
            set -e
          fi

          if [ "${PKGWHY_MODE}" = "strict" ] || [ "${PKGWHY_MODE}" = "agent" ]; then
            if [ "${precheck_status}" -ne 0 ]; then
              exit "${precheck_status}"
            fi
            if [ "${audit_status}" -ne 0 ]; then
              exit "${audit_status}"
            fi
            if [ "${agent_status}" -ne 0 ]; then
              exit "${agent_status}"
            fi
          fi

      - name: Upload pkgwhy reports
        uses: actions/upload-artifact@v4
        with:
          name: pkgwhy-reports
          path: pkgwhy-reports/
